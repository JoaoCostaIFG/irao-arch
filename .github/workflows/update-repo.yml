name: Update repository

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --cap-add=NET_ADMIN --device=/dev/net/tun
    steps:
      - uses: actions/checkout@v4

      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel rclone git sudo pacman-contrib

      - name: Create build user and install aurutils
        run: |
          useradd -m -G wheel builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          su - builder -c "git clone https://aur.archlinux.org/aurutils.git /tmp/aurutils && cd /tmp/aurutils && makepkg -sci --noconfirm"

      - name: Install Netbird from AUR
        run: |
          su - builder -c "git clone https://aur.archlinux.org/netbird-bin.git /tmp/netbird && cd /tmp/netbird && makepkg -si --noconfirm"

      - name: Connect to VPN
        env:
          SETUP_KEY: ${{ secrets.NETBIRD_SETUP_KEY }}
        run: |
          netbird service run &
          sleep 2
          netbird up --setup-key="${SETUP_KEY}" --hostname="irao-arch-update-job" --management-url="https://vpn.joaocosta.dev"
          while [ -z "$(netbird status | grep 'Management: Connected')" ]; do
            echo "Waiting for Netbird to connect..."
            sleep 5
          done
          echo "Netbird management connected"

      - name: Verify VPN DNS
        env:
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
        run: |
          S3_HOST=$(echo "$S3_ENDPOINT" | sed -E "s|^https?://([^:/]+).*|\1|")
          if ! getent hosts "$S3_HOST" > /dev/null 2>&1; then
            echo "ERROR: Cannot resolve \"$S3_HOST\" — VPN DNS likely not active. Bailing out."
            exit 1
          fi
          echo "DNS OK: $S3_HOST resolves"

      - name: Configure pacman repo
        env:
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          BUCKET_NAME: ${{ vars.BUCKET_NAME }}
        run: |
          printf '\n[irao-arch]\nSigLevel = Optional TrustAll\nServer = %s/%s/x86_64/\n' "$S3_ENDPOINT" "$BUCKET_NAME" >> /etc/pacman.conf
          pacman -Sy --noconfirm

      - name: Setup env and run sync
        env:
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          BUCKET_NAME: ${{ vars.BUCKET_NAME }}
          ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
          ACCESS_KEY_SECRET: ${{ secrets.ACCESS_KEY_SECRET }}
        run: |
          printf "S3_ENDPOINT=%s\nBUCKET_NAME=%s\nACCESS_KEY_ID=%s\nACCESS_KEY_SECRET=%s\n" \
            "$S3_ENDPOINT" "$BUCKET_NAME" "$ACCESS_KEY_ID" "$ACCESS_KEY_SECRET" > .env
          chown -R builder:builder .
          sudo -u builder ./sync-repo.sh -u
